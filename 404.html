<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DZESPORTS — 404</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060810; --bg2: #0a0d16; --surface: #111827; --border: #1e2d45;
      --text: #e8eaf0; --text-dim: #8896aa; --cyan: #00f5d4;
      --font-display: 'Exo 2', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-display); display: flex;
      align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden; position: relative;
    }
    /* Grid lines background */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(30,45,69,.3) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(30,45,69,.3) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* Glow */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,245,212,.05) 0%, transparent 70%);
    }
    .container {
      position: relative; z-index: 1; text-align: center; padding: 40px 20px;
      max-width: 600px;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 12rem); font-weight: 900; line-height: 1;
      color: transparent; -webkit-text-stroke: 2px var(--cyan);
      text-shadow: 0 0 80px rgba(0,245,212,.15);
      letter-spacing: -.05em; margin-bottom: 0;
    }
    .error-tag {
      font-family: var(--font-mono); font-size: .75rem; color: var(--cyan);
      letter-spacing: .35em; text-transform: uppercase; margin-bottom: 20px; display: block;
    }
    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 900;
      margin-bottom: 12px; letter-spacing: -.01em;
    }
    .error-desc {
      font-family: var(--font-mono); font-size: .8rem; color: var(--text-dim);
      letter-spacing: .1em; line-height: 1.8; margin-bottom: 36px;
    }
    /* Progress bar */
    .redirect-bar-wrap {
      width: 200px; height: 2px; background: var(--border); margin: 0 auto 20px;
    }
    .redirect-bar {
      height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
      animation: shrink 3s linear forwards;
    }
    @keyframes shrink { from { width: 100%; } to { width: 0; } }
    .redirect-text {
      font-family: var(--font-mono); font-size: .7rem; color: var(--text-dim);
      letter-spacing: .2em; margin-bottom: 24px;
    }
    .redirect-count { color: var(--cyan); }
    .home-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--cyan); color: var(--bg);
      padding: 14px 32px; font-family: var(--font-display); font-weight: 700;
      font-size: .9rem; letter-spacing: .15em; text-transform: uppercase;
      text-decoration: none; border: none;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      transition: all .25s ease; cursor: pointer;
    }
    .home-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,245,212,.5); }
    /* Corner decorations */
    .corner {
      position: fixed; width: 60px; height: 60px; z-index: 1;
      border-color: var(--border); border-style: solid;
    }
    .corner-tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }
    /* Scanline */
    @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
    .scanline {
      position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
    }
    .scanline::after {
      content: ''; position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(transparent, rgba(0,245,212,.08), transparent);
      animation: scanline 6s linear infinite;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="scanline"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <div class="error-code">404</div>
    <span class="error-tag">// ERROR — PAGE NOT FOUND</span>
    <div class="error-title">You're Out of Bounds</div>
    <p class="error-desc">
      The page you're looking for doesn't exist,<br>
      was moved, or is still under construction.
    </p>
    <div class="redirect-bar-wrap">
      <div class="redirect-bar"></div>
    </div>
    <p class="redirect-text">
      Redirecting in <span class="redirect-count" id="countdown">3</span>s
    </p>
    <a href="index.html" class="home-btn">↩ BACK TO HOME</a>
  </div>

  <script>
    // Countdown & redirect
    let count = 3;
    const el = document.getElementById('countdown');
    const timer = setInterval(() => {
      count--;
      if (el) el.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>
</body>
</html>
